services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=docpulse
      - POSTGRES_PASSWORD=docpulse_password
      - POSTGRES_DB=docpulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/faiss_indexes:/app/faiss_indexes
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: