# Alembic Configuration File
# This file contains the configuration settings for Alembic migrations.

[alembic]
# Path to the script location
script_location = alembic

# Template to use to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Date format - this affects how migration versions are numbered
date_format = %Y%m%d_%H%M%S

# Logging configuration
[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
